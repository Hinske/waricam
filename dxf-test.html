<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DXF Parser Test Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #00aaff; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 20px; }
        
        .drop-zone {
            border: 3px dashed #444;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #252540;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #00aaff;
            background: #2a2a4a;
        }
        .drop-zone h3 { color: #00aaff; margin-bottom: 8px; }
        .drop-zone p { color: #888; }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls label { color: #888; }
        .controls input, .controls select {
            background: #252540;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .btn {
            background: #00aaff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn:hover { background: #0088cc; }
        .btn-danger { background: #ff4444; }
        .btn-danger:hover { background: #cc3333; }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: #252540;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .summary-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #00aaff;
        }
        .summary-card .label { color: #888; font-size: 12px; }
        .summary-card.success .value { color: #22c55e; }
        .summary-card.error .value { color: #ef4444; }
        .summary-card.warning .value { color: #eab308; }
        
        .results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .result-card {
            background: #252540;
            border-radius: 8px;
            overflow: hidden;
        }
        .result-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #333;
        }
        .result-header:hover { background: #2a2a4a; }
        .result-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .result-status.success { background: #22c55e; }
        .result-status.error { background: #ef4444; }
        .result-status.warning { background: #eab308; }
        .result-filename {
            flex: 1;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .result-meta {
            display: flex;
            gap: 16px;
            color: #888;
            font-size: 12px;
        }
        .result-meta span { white-space: nowrap; }
        .result-toggle { color: #888; }
        
        .result-details {
            padding: 16px;
            background: #1e1e30;
            display: none;
            font-size: 13px;
        }
        .result-details.visible { display: block; }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .detail-section h4 {
            color: #00aaff;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #333;
        }
        .detail-row .label { color: #888; }
        .detail-row .value { font-weight: 600; }
        
        .layer-list, .error-list {
            max-height: 150px;
            overflow-y: auto;
            background: #1a1a28;
            border-radius: 4px;
            padding: 8px;
        }
        .layer-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .layer-item:nth-child(odd) { background: #252540; }
        
        .error-item {
            padding: 8px;
            background: #3a1a1a;
            border-radius: 4px;
            margin-bottom: 4px;
            color: #ff8888;
            font-family: monospace;
            font-size: 12px;
        }
        
        .contour-preview {
            margin-top: 12px;
        }
        .contour-preview canvas {
            background: #1a1a28;
            border-radius: 4px;
            max-width: 100%;
        }
        
        .progress-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #00aaff;
            transition: width 0.3s;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .processing { animation: pulse 1s infinite; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 DXF Parser Test Tool</h1>
        <p class="subtitle">Mehrere DXF-Dateien gleichzeitig auf Parsing-Fehler prüfen</p>
        
        <div class="drop-zone" id="drop-zone">
            <h3>📂 DXF-Dateien hierher ziehen</h3>
            <p>oder klicken zum Auswählen (mehrere Dateien möglich)</p>
            <input type="file" id="file-input" accept=".dxf" multiple hidden>
        </div>
        
        <div class="controls">
            <label>Chaining-Toleranz:</label>
            <input type="number" id="tolerance" value="0.1" step="0.01" min="0.001" max="1" style="width: 80px;">
            <span style="color: #888;">mm</span>
            
            <label style="margin-left: 20px;">Vorschau:</label>
            <select id="preview-mode">
                <option value="none">Keine</option>
                <option value="small" selected>Klein (200px)</option>
                <option value="large">Groß (400px)</option>
            </select>
            
            <div style="flex: 1;"></div>
            
            <button class="btn btn-danger" id="btn-clear">🗑️ Alle löschen</button>
        </div>
        
        <div class="progress-bar" id="progress-bar" style="display: none;">
            <div class="fill" id="progress-fill" style="width: 0%;"></div>
        </div>
        
        <div class="summary" id="summary" style="display: none;">
            <div class="summary-card">
                <div class="value" id="sum-total">0</div>
                <div class="label">Dateien gesamt</div>
            </div>
            <div class="summary-card success">
                <div class="value" id="sum-success">0</div>
                <div class="label">Erfolgreich</div>
            </div>
            <div class="summary-card error">
                <div class="value" id="sum-error">0</div>
                <div class="label">Fehler</div>
            </div>
            <div class="summary-card warning">
                <div class="value" id="sum-warning">0</div>
                <div class="label">Warnungen</div>
            </div>
            <div class="summary-card">
                <div class="value" id="sum-contours">0</div>
                <div class="label">Konturen gesamt</div>
            </div>
            <div class="summary-card">
                <div class="value" id="sum-time">0</div>
                <div class="label">Parse-Zeit (ms)</div>
            </div>
        </div>
        
        <div class="results" id="results">
            <div class="empty-state">
                <p>Noch keine Dateien getestet</p>
            </div>
        </div>
    </div>
    
    <!-- Scripts aus WARICAM -->
    <script src="js/constants.js"></script>
    <script src="js/geometry.js"></script>
    <script src="js/dxf-parser.js"></script>
    
    <script>
        // ═══════════════════════════════════════════════════════════
        // DXF TEST TOOL
        // ═══════════════════════════════════════════════════════════
        
        const results = [];
        let isProcessing = false;
        
        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const resultsContainer = document.getElementById('results');
        const summaryEl = document.getElementById('summary');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        
        // Event Listeners
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });
        document.getElementById('btn-clear').addEventListener('click', () => {
            results.length = 0;
            renderResults();
        });
        
        // ═══════════════════════════════════════════════════════════
        // FILE PROCESSING
        // ═══════════════════════════════════════════════════════════
        
        async function handleFiles(files) {
            if (isProcessing) return;
            isProcessing = true;
            
            const fileArray = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.dxf'));
            
            if (fileArray.length === 0) {
                alert('Keine DXF-Dateien gefunden');
                isProcessing = false;
                return;
            }
            
            // Progress anzeigen
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';
            
            const tolerance = parseFloat(document.getElementById('tolerance').value) || 0.1;
            
            for (let i = 0; i < fileArray.length; i++) {
                const file = fileArray[i];
                progressFill.style.width = `${((i + 0.5) / fileArray.length) * 100}%`;
                
                try {
                    const result = await testFile(file, tolerance);
                    results.push(result);
                } catch (err) {
                    results.push({
                        filename: file.name,
                        filesize: file.size,
                        status: 'error',
                        error: err.message,
                        stack: err.stack
                    });
                }
                
                progressFill.style.width = `${((i + 1) / fileArray.length) * 100}%`;
                renderResults();
                
                // Kurze Pause für UI-Update
                await new Promise(r => setTimeout(r, 10));
            }
            
            progressBar.style.display = 'none';
            isProcessing = false;
        }
        
        async function testFile(file, tolerance) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden'));
                
                reader.onload = (e) => {
                    const content = e.target.result;
                    const startTime = performance.now();
                    
                    try {
                        // Parser aufrufen
                        if (typeof DXFParser === 'undefined') {
                            throw new Error('DXFParser nicht geladen!');
                        }
                        
                        const parseResult = DXFParser.parse(content, {
                            chainingTolerance: tolerance
                        });
                        
                        const parseTime = performance.now() - startTime;
                        
                        // Ergebnis analysieren
                        const result = {
                            filename: file.name,
                            filesize: file.size,
                            parseTime: parseTime.toFixed(1),
                            status: 'success',
                            warnings: [],
                            
                            // Parse-Ergebnis
                            success: parseResult.success,
                            contours: parseResult.contours || [],
                            layers: Array.from(parseResult.layers || []),
                            stats: parseResult.stats || {},
                            
                            // Detaillierte Statistik
                            totalContours: (parseResult.contours || []).length,
                            closedContours: 0,
                            openContours: 0,
                            totalPoints: 0,
                            minPoints: Infinity,
                            maxPoints: 0,
                            entityTypes: {},
                            layerStats: {}
                        };
                        
                        // Konturen analysieren
                        for (const contour of result.contours) {
                            if (contour.isClosed) {
                                result.closedContours++;
                            } else {
                                result.openContours++;
                            }
                            
                            const pointCount = contour.points?.length || 0;
                            result.totalPoints += pointCount;
                            if (pointCount < result.minPoints) result.minPoints = pointCount;
                            if (pointCount > result.maxPoints) result.maxPoints = pointCount;
                            
                            // Layer-Statistik
                            const layer = contour.layer || '(default)';
                            result.layerStats[layer] = (result.layerStats[layer] || 0) + 1;
                        }
                        
                        if (result.minPoints === Infinity) result.minPoints = 0;
                        
                        // Entity-Types aus Stats
                        if (parseResult.stats) {
                            result.entityTypes = { ...parseResult.stats };
                        }
                        
                        // Warnungen prüfen
                        if (result.openContours > 0) {
                            result.warnings.push(`${result.openContours} offene Konturen gefunden`);
                        }
                        if (result.totalContours === 0) {
                            result.warnings.push('Keine Konturen gefunden');
                            result.status = 'warning';
                        }
                        if (!parseResult.success) {
                            result.status = 'error';
                            result.error = 'Parser meldet Fehler';
                        }
                        
                        // Status anpassen
                        if (result.warnings.length > 0 && result.status === 'success') {
                            result.status = 'warning';
                        }
                        
                        resolve(result);
                        
                    } catch (err) {
                        resolve({
                            filename: file.name,
                            filesize: file.size,
                            parseTime: (performance.now() - startTime).toFixed(1),
                            status: 'error',
                            error: err.message,
                            stack: err.stack
                        });
                    }
                };
                
                reader.readAsText(file, 'ISO-8859-1');
            });
        }
        
        // ═══════════════════════════════════════════════════════════
        // RENDERING
        // ═══════════════════════════════════════════════════════════
        
        function renderResults() {
            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="empty-state"><p>Noch keine Dateien getestet</p></div>';
                summaryEl.style.display = 'none';
                return;
            }
            
            // Summary berechnen
            const summary = {
                total: results.length,
                success: results.filter(r => r.status === 'success').length,
                error: results.filter(r => r.status === 'error').length,
                warning: results.filter(r => r.status === 'warning').length,
                contours: results.reduce((sum, r) => sum + (r.totalContours || 0), 0),
                time: results.reduce((sum, r) => sum + parseFloat(r.parseTime || 0), 0).toFixed(0)
            };
            
            document.getElementById('sum-total').textContent = summary.total;
            document.getElementById('sum-success').textContent = summary.success;
            document.getElementById('sum-error').textContent = summary.error;
            document.getElementById('sum-warning').textContent = summary.warning;
            document.getElementById('sum-contours').textContent = summary.contours;
            document.getElementById('sum-time').textContent = summary.time;
            summaryEl.style.display = 'grid';
            
            // Ergebnisse rendern
            const previewMode = document.getElementById('preview-mode').value;
            const previewSize = previewMode === 'large' ? 400 : previewMode === 'small' ? 200 : 0;
            
            resultsContainer.innerHTML = results.map((r, idx) => {
                const sizeKB = (r.filesize / 1024).toFixed(1);
                
                let metaHtml = '';
                if (r.status !== 'error' || r.totalContours) {
                    metaHtml = `
                        <span>${r.totalContours || 0} Konturen</span>
                        <span>${r.layers?.length || 0} Layer</span>
                        <span>${r.parseTime || '?'} ms</span>
                    `;
                }
                
                return `
                    <div class="result-card">
                        <div class="result-header" onclick="toggleDetails(${idx})">
                            <div class="result-status ${r.status}"></div>
                            <div class="result-filename">${escapeHtml(r.filename)}</div>
                            <div class="result-meta">
                                <span>${sizeKB} KB</span>
                                ${metaHtml}
                            </div>
                            <span class="result-toggle">▼</span>
                        </div>
                        <div class="result-details" id="details-${idx}">
                            ${renderDetails(r, idx, previewSize)}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Previews zeichnen
            if (previewSize > 0) {
                results.forEach((r, idx) => {
                    if (r.contours && r.contours.length > 0) {
                        drawPreview(idx, r.contours, previewSize);
                    }
                });
            }
        }
        
        function renderDetails(result, idx, previewSize) {
            if (result.status === 'error' && !result.totalContours) {
                return `
                    <div class="error-list">
                        <div class="error-item">${escapeHtml(result.error || 'Unbekannter Fehler')}</div>
                        ${result.stack ? `<div class="error-item" style="font-size: 10px; color: #888;">${escapeHtml(result.stack)}</div>` : ''}
                    </div>
                `;
            }
            
            let html = '<div class="detail-grid">';
            
            // Konturen-Statistik
            html += `
                <div class="detail-section">
                    <h4>Konturen</h4>
                    <div class="detail-row"><span class="label">Gesamt:</span><span class="value">${result.totalContours}</span></div>
                    <div class="detail-row"><span class="label">Geschlossen:</span><span class="value">${result.closedContours}</span></div>
                    <div class="detail-row"><span class="label">Offen:</span><span class="value">${result.openContours}</span></div>
                    <div class="detail-row"><span class="label">Punkte gesamt:</span><span class="value">${result.totalPoints}</span></div>
                    <div class="detail-row"><span class="label">Punkte min/max:</span><span class="value">${result.minPoints} / ${result.maxPoints}</span></div>
                </div>
            `;
            
            // Entity-Types
            if (Object.keys(result.entityTypes).length > 0) {
                html += `
                    <div class="detail-section">
                        <h4>Entity-Types</h4>
                        ${Object.entries(result.entityTypes).map(([type, count]) => `
                            <div class="detail-row"><span class="label">${type}:</span><span class="value">${count}</span></div>
                        `).join('')}
                    </div>
                `;
            }
            
            // Layer
            if (result.layers && result.layers.length > 0) {
                html += `
                    <div class="detail-section">
                        <h4>Layer (${result.layers.length})</h4>
                        <div class="layer-list">
                            ${Object.entries(result.layerStats).map(([layer, count]) => `
                                <div class="layer-item">
                                    <span>${escapeHtml(layer)}</span>
                                    <span style="color: #888;">${count}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            html += '</div>';
            
            // Warnungen
            if (result.warnings && result.warnings.length > 0) {
                html += `
                    <div class="detail-section" style="margin-top: 12px;">
                        <h4 style="color: #eab308;">⚠️ Warnungen</h4>
                        <div class="error-list" style="background: #3a3a1a;">
                            ${result.warnings.map(w => `<div class="error-item" style="color: #eab308;">${escapeHtml(w)}</div>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            // Fehler
            if (result.error) {
                html += `
                    <div class="detail-section" style="margin-top: 12px;">
                        <h4 style="color: #ef4444;">❌ Fehler</h4>
                        <div class="error-list">
                            <div class="error-item">${escapeHtml(result.error)}</div>
                        </div>
                    </div>
                `;
            }
            
            // Preview Canvas
            if (previewSize > 0 && result.contours && result.contours.length > 0) {
                html += `
                    <div class="contour-preview">
                        <h4>Vorschau</h4>
                        <canvas id="preview-${idx}" width="${previewSize}" height="${previewSize}"></canvas>
                    </div>
                `;
            }
            
            return html;
        }
        
        function toggleDetails(idx) {
            const details = document.getElementById(`details-${idx}`);
            details.classList.toggle('visible');
        }
        
        // ═══════════════════════════════════════════════════════════
        // PREVIEW DRAWING
        // ═══════════════════════════════════════════════════════════
        
        function drawPreview(idx, contours, size) {
            const canvas = document.getElementById(`preview-${idx}`);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, size, size);
            
            // Bounds berechnen
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const c of contours) {
                for (const p of (c.points || [])) {
                    if (p.x < minX) minX = p.x;
                    if (p.y < minY) minY = p.y;
                    if (p.x > maxX) maxX = p.x;
                    if (p.y > maxY) maxY = p.y;
                }
            }
            
            if (!isFinite(minX)) return;
            
            const width = maxX - minX || 1;
            const height = maxY - minY || 1;
            const padding = 10;
            const scale = Math.min((size - padding * 2) / width, (size - padding * 2) / height);
            const offsetX = padding + (size - padding * 2 - width * scale) / 2;
            const offsetY = padding + (size - padding * 2 - height * scale) / 2;
            
            // Zeichnen
            ctx.strokeStyle = '#00aaff';
            ctx.lineWidth = 1;
            
            for (const contour of contours) {
                const points = contour.points;
                if (!points || points.length < 2) continue;
                
                // Farbe nach Typ
                if (contour.isClosed) {
                    ctx.strokeStyle = '#00aaff';
                } else {
                    ctx.strokeStyle = '#ff8800';
                }
                
                ctx.beginPath();
                const startX = offsetX + (points[0].x - minX) * scale;
                const startY = size - (offsetY + (points[0].y - minY) * scale);
                ctx.moveTo(startX, startY);
                
                for (let i = 1; i < points.length; i++) {
                    const x = offsetX + (points[i].x - minX) * scale;
                    const y = size - (offsetY + (points[i].y - minY) * scale);
                    ctx.lineTo(x, y);
                }
                
                ctx.stroke();
            }
        }
        
        // ═══════════════════════════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════════════════════════
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
        
        // Initial message
        console.log('%c🔍 DXF Parser Test Tool geladen', 'color: #00aaff; font-weight: bold');
        console.log('Dateien per Drag & Drop oder Klick laden');
    </script>
</body>
</html>
