<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>DXF Parser Test Suite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; 
            color: #e0e0e0; 
            padding: 20px;
            min-height: 100vh;
        }
        h1 { color: #00aaff; margin-bottom: 20px; }
        h2 { color: #888; font-size: 14px; margin-bottom: 10px; }
        
        .upload-zone {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #00aaff;
            background: rgba(0,170,255,0.1);
        }
        .upload-zone h3 { color: #00aaff; margin-bottom: 8px; }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-primary { background: #00aaff; color: white; }
        .btn-primary:hover { background: #0088cc; }
        .btn-secondary { background: #333; color: #ccc; }
        .btn-secondary:hover { background: #444; }
        .btn-danger { background: #dc3545; color: white; }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .summary-card {
            background: #252540;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .summary-card .value {
            font-size: 28px;
            font-weight: bold;
            color: #00aaff;
        }
        .summary-card .label { color: #888; font-size: 12px; }
        .summary-card.success .value { color: #22c55e; }
        .summary-card.warning .value { color: #eab308; }
        .summary-card.error .value { color: #ef4444; }
        
        .results {
            background: #252540;
            border-radius: 8px;
            overflow: hidden;
        }
        .result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #333;
            display: grid;
            grid-template-columns: 30px 1fr 100px 100px 100px 150px;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .result-item:last-child { border-bottom: none; }
        .result-item.header {
            background: #1a1a2e;
            font-weight: bold;
            color: #888;
            position: sticky;
            top: 0;
        }
        .result-item.success { border-left: 3px solid #22c55e; }
        .result-item.warning { border-left: 3px solid #eab308; }
        .result-item.error { border-left: 3px solid #ef4444; }
        
        .status-icon { font-size: 18px; }
        .filename { 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            font-family: monospace;
        }
        .num { text-align: right; font-family: monospace; }
        
        .details {
            background: #1a1a2e;
            padding: 10px 16px;
            font-size: 12px;
            color: #888;
            display: none;
        }
        .details.visible { display: block; }
        .details pre {
            background: #0d0d1a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 200px;
            margin-top: 8px;
        }
        
        .progress {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: #00aaff;
            width: 0%;
            transition: width 0.3s;
        }
        
        .log {
            background: #0d0d1a;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry { margin-bottom: 4px; }
        .log-entry.info { color: #00aaff; }
        .log-entry.success { color: #22c55e; }
        .log-entry.warning { color: #eab308; }
        .log-entry.error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🔍 DXF Parser Test Suite</h1>
    
    <div class="upload-zone" id="upload-zone">
        <h3>📂 DXF-Dateien hierher ziehen</h3>
        <p>oder klicken zum Auswählen (mehrere Dateien möglich)</p>
        <input type="file" id="file-input" accept=".dxf" multiple hidden>
    </div>
    
    <div class="controls">
        <button class="btn-primary" id="btn-test-all">▶️ Alle testen</button>
        <button class="btn-secondary" id="btn-clear">🗑️ Liste leeren</button>
        <button class="btn-secondary" id="btn-export-csv">📊 CSV Export</button>
        <label style="display: flex; align-items: center; gap: 8px; color: #888;">
            <input type="checkbox" id="chk-verbose" checked> Verbose Logs
        </label>
        <label style="display: flex; align-items: center; gap: 8px; color: #888;">
            Toleranz: <input type="number" id="tolerance" value="0.1" step="0.01" min="0.001" style="width: 70px; padding: 5px; background: #333; border: 1px solid #444; color: white; border-radius: 4px;"> mm
        </label>
    </div>
    
    <div class="progress" id="progress" style="display: none;">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    
    <div class="summary" id="summary" style="display: none;">
        <div class="summary-card">
            <div class="value" id="sum-total">0</div>
            <div class="label">Dateien</div>
        </div>
        <div class="summary-card success">
            <div class="value" id="sum-success">0</div>
            <div class="label">Erfolgreich</div>
        </div>
        <div class="summary-card warning">
            <div class="value" id="sum-warning">0</div>
            <div class="label">Warnungen</div>
        </div>
        <div class="summary-card error">
            <div class="value" id="sum-error">0</div>
            <div class="label">Fehler</div>
        </div>
        <div class="summary-card">
            <div class="value" id="sum-contours">0</div>
            <div class="label">Konturen gesamt</div>
        </div>
        <div class="summary-card">
            <div class="value" id="sum-time">0</div>
            <div class="label">Zeit (ms)</div>
        </div>
    </div>
    
    <div class="results" id="results">
        <div class="result-item header">
            <span></span>
            <span>Dateiname</span>
            <span class="num">Größe</span>
            <span class="num">Konturen</span>
            <span class="num">Layer</span>
            <span class="num">Zeit</span>
        </div>
    </div>
    
    <div class="log" id="log"></div>

    <!-- Parser Scripts -->
    <script src="js/constants.js"></script>
    <script src="js/geometry.js"></script>
    <script src="js/dxf-parser.js"></script>
    <script src="js/cam-contour.js"></script>
    <script src="js/ceracut-pipeline.js"></script>
    
    <script>
    class DXFTestSuite {
        constructor() {
            this.files = [];
            this.results = [];
            this.bindEvents();
            this.log('🔍 DXF Parser Test Suite bereit', 'info');
            this.log(`Parser Version: ${typeof DXFParser !== 'undefined' ? 'OK' : 'FEHLT!'}`, 
                     typeof DXFParser !== 'undefined' ? 'success' : 'error');
        }
        
        bindEvents() {
            const uploadZone = document.getElementById('upload-zone');
            const fileInput = document.getElementById('file-input');
            
            uploadZone.addEventListener('click', () => fileInput.click());
            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('dragover');
            });
            uploadZone.addEventListener('dragleave', () => {
                uploadZone.classList.remove('dragover');
            });
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('dragover');
                this.addFiles(e.dataTransfer.files);
            });
            fileInput.addEventListener('change', (e) => {
                this.addFiles(e.target.files);
            });
            
            document.getElementById('btn-test-all').addEventListener('click', () => this.runAllTests());
            document.getElementById('btn-clear').addEventListener('click', () => this.clearAll());
            document.getElementById('btn-export-csv').addEventListener('click', () => this.exportCSV());
        }
        
        addFiles(fileList) {
            const dxfFiles = Array.from(fileList).filter(f => 
                f.name.toLowerCase().endsWith('.dxf')
            );
            
            if (dxfFiles.length === 0) {
                this.log('⚠️ Keine DXF-Dateien gefunden', 'warning');
                return;
            }
            
            this.files.push(...dxfFiles);
            this.log(`📁 ${dxfFiles.length} Datei(en) hinzugefügt (gesamt: ${this.files.length})`, 'info');
            this.updateFileList();
        }
        
        updateFileList() {
            const resultsEl = document.getElementById('results');
            
            // Header behalten
            resultsEl.innerHTML = `
                <div class="result-item header">
                    <span></span>
                    <span>Dateiname</span>
                    <span class="num">Größe</span>
                    <span class="num">Konturen</span>
                    <span class="num">Layer</span>
                    <span class="num">Zeit</span>
                </div>
            `;
            
            this.files.forEach((file, i) => {
                const result = this.results[i];
                const status = result ? (result.error ? 'error' : (result.warnings > 0 ? 'warning' : 'success')) : '';
                const icon = result ? (result.error ? '❌' : (result.warnings > 0 ? '⚠️' : '✅')) : '⏳';
                
                const item = document.createElement('div');
                item.className = `result-item ${status}`;
                item.innerHTML = `
                    <span class="status-icon">${icon}</span>
                    <span class="filename" title="${file.name}">${file.name}</span>
                    <span class="num">${this.formatSize(file.size)}</span>
                    <span class="num">${result ? result.contours : '-'}</span>
                    <span class="num">${result ? result.layers : '-'}</span>
                    <span class="num">${result ? result.time + ' ms' : '-'}</span>
                `;
                item.style.cursor = 'pointer';
                item.addEventListener('click', () => this.toggleDetails(i));
                resultsEl.appendChild(item);
                
                // Details
                const details = document.createElement('div');
                details.className = 'details';
                details.id = `details-${i}`;
                if (result) {
                    details.innerHTML = `
                        <strong>Ergebnis:</strong> ${result.error || 'Erfolgreich'}<br>
                        <strong>Geschlossene Konturen:</strong> ${result.closed}<br>
                        <strong>Offene Konturen:</strong> ${result.open}<br>
                        <strong>Layer:</strong> ${result.layerNames || '-'}<br>
                        ${result.warnings > 0 ? `<strong>Warnungen:</strong> ${result.warningMessages}<br>` : ''}
                        ${result.entities ? `<pre>${JSON.stringify(result.entities, null, 2)}</pre>` : ''}
                    `;
                }
                resultsEl.appendChild(details);
            });
        }
        
        toggleDetails(index) {
            const details = document.getElementById(`details-${index}`);
            if (details) {
                details.classList.toggle('visible');
            }
        }
        
        async runAllTests() {
            if (this.files.length === 0) {
                this.log('⚠️ Keine Dateien geladen', 'warning');
                return;
            }
            
            this.results = [];
            const tolerance = parseFloat(document.getElementById('tolerance').value) || 0.1;
            const verbose = document.getElementById('chk-verbose').checked;
            
            document.getElementById('progress').style.display = 'block';
            document.getElementById('summary').style.display = 'grid';
            
            const startTotal = performance.now();
            let successCount = 0, warningCount = 0, errorCount = 0;
            let totalContours = 0;
            
            this.log(`\n${'═'.repeat(50)}`, 'info');
            this.log(`🚀 Starte Test von ${this.files.length} Dateien (Toleranz: ${tolerance}mm)`, 'info');
            this.log(`${'═'.repeat(50)}`, 'info');
            
            for (let i = 0; i < this.files.length; i++) {
                const file = this.files[i];
                const progress = ((i + 1) / this.files.length) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
                
                try {
                    const content = await this.readFile(file);
                    const start = performance.now();
                    
                    const result = DXFParser.parse(content, {
                        chainingTolerance: tolerance
                    });
                    
                    const time = Math.round(performance.now() - start);
                    
                    if (result && result.success) {
                        const contours = result.contours || [];
                        const closed = contours.filter(c => c.isClosed).length;
                        const open = contours.length - closed;
                        const layers = result.layers ? result.layers.size : 0;
                        const layerNames = result.layers ? Array.from(result.layers).join(', ') : '';
                        
                        // NEU: Entity-Statistik aus Parser V2.7
                        const entities = result.stats || {};
                        
                        // Warnungen prüfen
                        let warnings = 0;
                        let warningMessages = [];
                        
                        // Parser-Warnungen nutzen
                        if (result.warnings && result.warnings.length > 0) {
                            result.warnings.forEach(w => {
                                warnings++;
                                warningMessages.push(w.message);
                            });
                        }
                        
                        // Ignorierte Entities
                        const ignoredCount = result.ignoredCount || 0;
                        const ignoredTypes = result.ignoredTypes || [];
                        
                        this.results[i] = {
                            success: true,
                            contours: contours.length,
                            closed,
                            open,
                            layers,
                            layerNames,
                            time,
                            entities,
                            warnings,
                            warningMessages: warningMessages.join(', '),
                            ignoredCount,
                            ignoredTypes: ignoredTypes.join(', ')
                        };
                        
                        totalContours += contours.length;
                        
                        if (warnings > 0) {
                            warningCount++;
                            if (verbose) this.log(`⚠️ ${file.name}: ${contours.length} Konturen (${warningMessages.join(', ')})`, 'warning');
                        } else {
                            successCount++;
                            if (verbose) this.log(`✅ ${file.name}: ${contours.length} Konturen, ${layers} Layer, ${time}ms`, 'success');
                        }
                    } else {
                        throw new Error(result?.error || 'Parse fehlgeschlagen');
                    }
                    
                } catch (error) {
                    errorCount++;
                    this.results[i] = {
                        success: false,
                        error: error.message,
                        contours: 0,
                        closed: 0,
                        open: 0,
                        layers: 0,
                        time: 0,
                        warnings: 0
                    };
                    this.log(`❌ ${file.name}: ${error.message}`, 'error');
                }
                
                this.updateFileList();
            }
            
            const totalTime = Math.round(performance.now() - startTotal);
            
            // Summary aktualisieren
            document.getElementById('sum-total').textContent = this.files.length;
            document.getElementById('sum-success').textContent = successCount;
            document.getElementById('sum-warning').textContent = warningCount;
            document.getElementById('sum-error').textContent = errorCount;
            document.getElementById('sum-contours').textContent = totalContours;
            document.getElementById('sum-time').textContent = totalTime;
            
            this.log(`\n${'═'.repeat(50)}`, 'info');
            this.log(`📊 ERGEBNIS: ${successCount}/${this.files.length} OK, ${warningCount} Warnungen, ${errorCount} Fehler`, 
                     errorCount > 0 ? 'error' : (warningCount > 0 ? 'warning' : 'success'));
            this.log(`⏱️ Gesamtzeit: ${totalTime}ms (${totalContours} Konturen)`, 'info');
            this.log(`${'═'.repeat(50)}`, 'info');
        }
        
        readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = () => reject(new Error('Datei nicht lesbar'));
                reader.readAsText(file, 'ISO-8859-1');
            });
        }
        
        clearAll() {
            this.files = [];
            this.results = [];
            this.updateFileList();
            document.getElementById('summary').style.display = 'none';
            document.getElementById('progress').style.display = 'none';
            document.getElementById('log').innerHTML = '';
            this.log('🗑️ Liste geleert', 'info');
        }
        
        exportCSV() {
            if (this.results.length === 0) {
                this.log('⚠️ Keine Ergebnisse zum Exportieren', 'warning');
                return;
            }
            
            const headers = ['Dateiname', 'Größe (KB)', 'Status', 'Konturen', 'Geschlossen', 'Offen', 'Layer', 'Zeit (ms)', 'Fehler/Warnungen'];
            const rows = this.files.map((file, i) => {
                const r = this.results[i] || {};
                return [
                    file.name,
                    (file.size / 1024).toFixed(1),
                    r.error ? 'FEHLER' : (r.warnings > 0 ? 'WARNUNG' : 'OK'),
                    r.contours || 0,
                    r.closed || 0,
                    r.open || 0,
                    r.layers || 0,
                    r.time || 0,
                    r.error || r.warningMessages || ''
                ].join(';');
            });
            
            const csv = [headers.join(';'), ...rows].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dxf-parser-test-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            this.log('📊 CSV exportiert', 'success');
        }
        
        formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }
    }
    
    // Init
    document.addEventListener('DOMContentLoaded', () => {
        window.testSuite = new DXFTestSuite();
    });
    </script>
</body>
</html>
